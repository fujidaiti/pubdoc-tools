name: pubdoc
description: >
  A CLI tool that provides LLM-friendly, version-aware API documentation for
  Dart/Flutter packages.
version: 0.0.1
repository: https://github.com/fujidaiti/pubdoc.git

environment:
  sdk: ^3.10.0
resolution: workspace

dependencies:
  args: ^2.7.0
  dartdoc_txt:
    path: ../dartdoc_txt
  file: ^7.0.1
  path: ^1.9.1
  pub_semver: ^2.2.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
