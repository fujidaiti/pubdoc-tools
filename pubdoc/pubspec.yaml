name: pubdoc
description: >
  A CLI tool that provides LLM-friendly, version-aware API documentation for
  Dart/Flutter packages.
version: 0.1.2
repository: https://github.com/fujidaiti/pubdoc

environment:
  sdk: ^3.10.0
resolution: workspace

executables:
  pubdoc: main

dependencies:
  args: ^2.7.0
  dartdoc_txt: ^0.1.2
  logging: ^1.3.0
  file: ^7.0.1
  meta: ^1.17.0
  path: ^1.9.1
  pub_semver: ^2.2.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.12.2
  lints: ^6.0.0
  mockito: ^5.6.3
  test: ^1.25.6
