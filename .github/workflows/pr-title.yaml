name: PR Title

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: python3 tool/check_pr_title.py "$TITLE"
