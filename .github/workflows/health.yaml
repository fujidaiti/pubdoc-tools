name: Health
on:
  pull_request:

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qP '^\[(misc|dartdoc|pubdoc)\] [A-Z]'; then
            echo "PR title does not follow the required format."
            echo "Expected: [<scope>] Sentence case title"
            echo "Where <scope> is one of: misc, dartdoc, pubdoc"
            echo "And the title starts with an uppercase letter."
            echo ""
            echo "Got: $TITLE"
            exit 1
          fi

  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prettier check
        run: npx prettier --check .
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Get dependencies
        run: dart pub get
      - name: Verify generated code is up-to-date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code
      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .
      - name: Analyze code
        run: dart analyze --fatal-infos --fatal-warnings

  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: git submodule update --init
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Test dartdoc_txt
        run: dart test
        working-directory: dartdoc_txt
      - name: Test pubdoc
        run: dart test
        working-directory: pubdoc
